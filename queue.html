<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NoodleHaus — Order Queue</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#252836;
  --accent:#e84c2b;--green:#27ae60;--yellow:#f1c40f;--blue:#3498db;
  --text:#f5f5f5;--muted:#8b8d97;--border:#2e3140;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;height:100vh}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 2rem;background:var(--surface);border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:1rem}
.logo{font-size:1.6rem;font-weight:800;color:var(--accent)}
.clock{font-family:'DM Mono',monospace;font-size:1.3rem;color:var(--muted)}
.live-dot{width:10px;height:10px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Main layout */
.main{display:grid;grid-template-columns:1fr 1.4fr;height:calc(100vh - 60px);gap:0}

/* NOW SERVING — left */
.now-serving{background:var(--surface);padding:1.5rem;overflow:hidden;border-right:1px solid var(--border)}
.section-title{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.section-title .dot{width:8px;height:8px;border-radius:50%}

.ready-grid{display:flex;flex-direction:column;gap:1rem;overflow:hidden}
.ready-card{
  background:linear-gradient(135deg,#1b3a2a,#1a2e24);
  border:2px solid var(--green);border-radius:16px;padding:1.2rem 1.5rem;
  display:flex;align-items:center;gap:1.2rem;
  animation:slideIn .5s ease-out;
}
.ready-card .order-num{
  font-family:'DM Mono',monospace;font-size:2rem;font-weight:800;color:var(--green);
  min-width:120px;
}
.ready-card .order-info{flex:1}
.ready-card .customer{font-size:1rem;font-weight:600}
.ready-card .items{font-size:.82rem;color:var(--muted);margin-top:.25rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.ready-badge{
  background:var(--green);color:#fff;padding:.3rem .8rem;border-radius:20px;
  font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  animation:glow 1.5s ease-in-out infinite alternate;
}
@keyframes glow{0%{box-shadow:0 0 5px rgba(39,174,96,.3)}100%{box-shadow:0 0 20px rgba(39,174,96,.6)}}

/* PREPARING — right */
.preparing{padding:1.5rem;overflow:hidden}
.prep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.8rem}
.prep-card{
  background:var(--surface2);border-radius:12px;padding:1rem;
  border-left:4px solid var(--yellow);
  animation:fadeIn .4s ease-out;
}
.prep-card.preparing-status{border-left-color:var(--accent)}
.prep-card .order-num{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--yellow)}
.prep-card.preparing-status .order-num{color:var(--accent)}
.prep-card .customer{font-size:.85rem;font-weight:600;margin-top:.3rem}
.prep-card .items{font-size:.78rem;color:var(--muted);margin-top:.2rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prep-card .status-tag{
  display:inline-block;margin-top:.5rem;padding:.15rem .5rem;border-radius:10px;
  font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
}
.prep-card .status-tag.pending{background:rgba(241,196,15,.15);color:var(--yellow)}
.prep-card .status-tag.preparing{background:rgba(232,76,43,.15);color:var(--accent)}

/* SERVED ticker */
.served-ticker{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:.5rem 2rem;display:flex;align-items:center;gap:1.5rem;
  font-size:.82rem;overflow:hidden;
}
.served-ticker .label{color:var(--muted);font-weight:600;white-space:nowrap}
.served-ticker .items{display:flex;gap:1.5rem;animation:scroll 30s linear infinite}
.served-ticker .served-item{white-space:nowrap;color:var(--muted)}
.served-ticker .served-item span{color:var(--green);font-weight:600}

/* Empty state */
.empty{text-align:center;padding:3rem;color:var(--muted)}
.empty .icon{font-size:3rem;margin-bottom:.5rem}

@keyframes slideIn{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Responsive for smaller TV */
@media(max-width:900px){
  .main{grid-template-columns:1fr}
  .now-serving{border-right:none;border-bottom:1px solid var(--border)}
  .ready-card .order-num{font-size:1.5rem;min-width:90px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo" id="q-logo">🍜 NoodleHaus</div>
    <div class="live-dot"></div>
  </div>
  <div class="clock" id="q-clock">--:--</div>
</div>

<div class="main">
  <!-- LEFT: Now Serving -->
  <div class="now-serving">
    <div class="section-title">
      <div class="dot" style="background:var(--green)"></div>
      Now Serving
    </div>
    <div class="ready-grid" id="q-ready">
      <div class="empty"><div class="icon">🍳</div>No orders ready yet</div>
    </div>
  </div>

  <!-- RIGHT: Preparing -->
  <div class="preparing">
    <div class="section-title">
      <div class="dot" style="background:var(--yellow)"></div>
      Preparing
    </div>
    <div class="prep-grid" id="q-preparing">
      <div class="empty"><div class="icon">⏳</div>No orders in queue</div>
    </div>
  </div>
</div>

<!-- Bottom ticker: recently served -->
<div class="served-ticker">
  <div class="label">✅ Completed:</div>
  <div class="items" id="q-served"><span class="served-item" style="color:var(--muted)">—</span></div>
</div>

<script>
const POLL_INTERVAL = 5000; // 5 seconds
let prevReady = '', prevPrep = '';

function formatNum(id) {
  return 'NH-' + String(id).padStart(6, '0');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderReady(items) {
  const el = document.getElementById('q-ready');
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="icon">🍳</div>No orders ready yet</div>';
    return;
  }
  const key = items.map(i=>i.order_id).join(',');
  if (key === prevReady) return;
  prevReady = key;

  el.innerHTML = items.map(item => `
    <div class="ready-card">
      <div class="order-num">${formatNum(item.order_id)}</div>
      <div class="order-info">
        <div class="customer">${esc(item.customer_name || 'Guest')}</div>
        <div class="items">${esc(item.items || '')}</div>
      </div>
      <div class="ready-badge">Ready</div>
    </div>
  `).join('');
}

function renderPreparing(items) {
  const el = document.getElementById('q-preparing');
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="icon">⏳</div>No orders in queue</div>';
    return;
  }
  const key = items.map(i=>i.order_id+i.status).join(',');
  if (key === prevPrep) return;
  prevPrep = key;

  el.innerHTML = items.map(item => {
    const isPreparing = item.status === 'preparing';
    return `
    <div class="prep-card ${isPreparing ? 'preparing-status' : ''}">
      <div class="order-num">${formatNum(item.order_id)}</div>
      <div class="customer">${esc(item.customer_name || 'Guest')}</div>
      <div class="items">${esc(item.items || '')}</div>
      <span class="status-tag ${item.status}">${isPreparing ? '🔥 Preparing' : '⏳ Pending'}</span>
    </div>`;
  }).join('');
}

function renderServed(items) {
  const el = document.getElementById('q-served');
  if (!items.length) {
    el.innerHTML = '<span class="served-item" style="color:var(--muted)">—</span>';
    return;
  }
  // Duplicate for infinite scroll effect
  const html = items.map(i => `
    <span class="served-item"><span>${formatNum(i.order_id)}</span> ${esc(i.customer_name||'Guest')}</span>
  `).join('');
  el.innerHTML = html + html;
}

function updateClock(time) {
  var _n=new Date();document.getElementById('q-clock').textContent=('0'+(_n.getHours()%12||12)).slice(-2)+':'+('0'+_n.getMinutes()).slice(-2)+':'+('0'+_n.getSeconds()).slice(-2)+' '+(_n.getHours()>=12?'PM':'AM');
}

async function poll() {
  try {
    const r = await fetch('queue_api.php?_=' + Date.now());
    const d = await r.json();
    if (!d.ok) return;

    renderReady(d.ready);
    renderPreparing(d.preparing);
    renderServed(d.served);
    updateClock();

    // Update branding
    if (d.name) document.getElementById('q-logo').textContent = '🍜 ' + d.name;
  } catch(e) {
    console.error('Queue poll error:', e);
  }
}

// Sound notification when new ready order
let lastReadyIds = [];
function checkNewReady(ready) {
  const ids = ready.map(r => r.order_id);
  const newOnes = ids.filter(id => !lastReadyIds.includes(id));
  if (newOnes.length > 0 && lastReadyIds.length > 0) {
    playDing();
  }
  lastReadyIds = ids;
}

function playDing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

// Override poll to include sound check
const _origPoll = poll;
async function pollWithSound() {
  try {
    const r = await fetch('queue_api.php?_=' + Date.now());
    const d = await r.json();
    if (!d.ok) return;
    checkNewReady(d.ready || []);
    renderReady(d.ready);
    renderPreparing(d.preparing);
    renderServed(d.served);
    updateClock();
    if (d.name) document.getElementById('q-logo').textContent = '🍜 ' + d.name;
  } catch(e) {}
}

// Fullscreen on click
document.body.addEventListener('dblclick', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
});

// Start polling
pollWithSound();
setInterval(pollWithSound, POLL_INTERVAL);
updateClock();
setInterval(() => updateClock(), 60000);
</script>
</body>
</html>

name: Deploy to NoodleHaus Server

on:
  push:
    branches: [ main ]
    paths:
      - 'landing/**'
      - 'index.html'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy landing page via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "landing/index.html"
          target: "/var/www/html/"
          strip_components: 1

      - name: Notify deploy done
        run: echo "✅ Landing page deployed to noodlehaus-pos.duckdns.org/landing/"
